<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 みずやり手帳</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f2efe8; --surface:#fdfbf6; --green-dark:#2a3d2a; --green-mid:#4a7a55;
  --green-light:#8ab89a; --green-pale:#daeade; --amber:#b8823a;
  --text:#1e1e14; --muted:#7a7a68; --border:#dedad0;
  --red:#b83232; --red-pale:#fbeaea; --yellow:#c89a10; --yellow-pale:#fdf6dc;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── HEADER ── */
header{background:var(--green-dark);color:#fff;padding:13px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:60;}
.logo{font-size:22px;}
header h1{font-size:16px;font-weight:700;letter-spacing:.04em;}
header small{font-size:9px;opacity:.6;font-family:'Shippori Mincho',serif;}
.today-pill{margin-left:auto;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.22);border-radius:30px;padding:3px 11px;font-size:11px;text-align:center;line-height:1.5;}
.today-pill b{display:block;font-size:14px;}

/* ── TABS ── */
.tabs{display:flex;background:var(--surface);border-bottom:2px solid var(--border);position:sticky;top:55px;z-index:50;}
.tab-btn{flex:1;padding:10px 4px;border:none;background:transparent;font-family:inherit;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .18s;}
.tab-btn.active{color:var(--green-mid);border-bottom-color:var(--green-mid);}

/* ── SUMMARY ── */
.summary{display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
.sum-item{flex:1;padding:8px 4px;text-align:center;border-right:1px solid var(--border);font-size:10px;color:var(--muted);}
.sum-item:last-child{border-right:none;}
.sum-item b{display:block;font-size:19px;color:var(--text);margin-bottom:1px;}
.sum-urgent b{color:var(--red);} .sum-soon b{color:var(--yellow);} .sum-ok b{color:var(--green-mid);}

/* ── LOCATION TABS (scroll) ── */
.loc-scroll-wrap{background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.loc-scroll-wrap::-webkit-scrollbar{display:none;}
.loc-tabs{display:flex;gap:0;min-width:max-content;padding:0 10px;}
.loc-tab{padding:8px 14px;border:none;background:transparent;font-family:inherit;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:0;white-space:nowrap;transition:all .15s;}
.loc-tab.active{color:var(--green-mid);border-bottom-color:var(--green-mid);}

/* ── CONTROLS ── */
.controls{padding:8px 10px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.filter-btn{padding:4px 10px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-family:inherit;font-size:11px;cursor:pointer;color:var(--muted);transition:all .15s;white-space:nowrap;}
.filter-btn.active{background:var(--green-dark);border-color:var(--green-dark);color:#fff;}
.search-box{margin-left:auto;padding:5px 10px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);font-family:inherit;font-size:12px;color:var(--text);outline:none;width:130px;}
.search-box:focus{border-color:var(--green-mid);}

/* ── SELECT MODE TOGGLE ── */
.sel-mode-bar{
  background:var(--surface);border-bottom:2px solid var(--border);
  padding:8px 12px;display:flex;align-items:center;gap:8px;
}
.sel-mode-btn{
  padding:7px 16px;border-radius:20px;border:2px solid var(--green-mid);
  background:transparent;color:var(--green-mid);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;
}
.sel-mode-btn.on{background:var(--green-mid);color:#fff;}
.sel-hint{font-size:11px;color:var(--muted);}

/* ── BULK ACTION BAR ── */
.bulk-bar{
  display:none;background:var(--green-dark);color:#fff;
  padding:10px 14px;align-items:center;gap:8px;flex-wrap:wrap;
  position:sticky;top:55px;z-index:45;
}
.bulk-bar.vis{display:flex;}
.bulk-count{font-size:12px;font-weight:700;min-width:60px;}
.bulk-add-group{display:flex;gap:5px;flex-wrap:wrap;align-items:center;flex:1;}
.bulk-add-group label{font-size:10px;opacity:.75;}
.achip{padding:4px 10px;border-radius:20px;border:1.5px solid rgba(255,255,255,.35);background:transparent;color:#fff;font-family:inherit;font-size:11px;cursor:pointer;transition:all .15s;}
.achip.sel{background:rgba(255,255,255,.25);border-color:#fff;}
.bulk-ok{padding:7px 16px;border-radius:8px;border:none;background:#fff;color:var(--green-dark);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;}
.bulk-clr{font-size:10px;opacity:.7;cursor:pointer;text-decoration:underline;}

/* ── PLANT LIST ── */
.plant-list{padding:6px 10px 80px;display:flex;flex-direction:column;gap:5px;}
.loc-section-label{
  font-size:11px;font-weight:700;color:var(--green-dark);
  padding:12px 6px 4px;display:flex;align-items:center;gap:6px;
}
.loc-section-label .loc-icon{font-size:15px;}
.status-section-label{
  font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--muted);
  text-transform:uppercase;padding:6px 5px 2px;border-top:1px dashed var(--border);margin-top:2px;
}

/* Card layout redesign: left=checkbox area, center=img+info, right=days only */
.plant-card{
  background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);
  display:flex;align-items:stretch;overflow:hidden;transition:all .15s;position:relative;
}
.plant-card.urgent{border-color:#f0c0c0;background:var(--red-pale);}
.plant-card.soon{border-color:#f0e0a0;background:var(--yellow-pale);}
.plant-card.sel-card{box-shadow:0 0 0 2.5px var(--green-mid);}

/* Left: checkbox zone - only visible in select mode */
.card-check{
  display:none;width:44px;flex-shrink:0;align-items:center;justify-content:center;cursor:pointer;
  background:transparent;border:none;
}
.select-mode .card-check{display:flex;}
.chk-circle{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--border);
  background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;
}
.sel-card .chk-circle{background:var(--green-mid);border-color:var(--green-mid);color:#fff;}

/* Center: image */
.plant-img{
  width:58px;min-height:58px;flex-shrink:0;background:var(--green-pale);
  display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden;cursor:pointer;
}
.plant-img img{width:100%;height:100%;object-fit:cover;display:block;}
.select-mode .plant-img{cursor:pointer;}

.status-bar{width:4px;align-self:stretch;flex-shrink:0;}
.urgent .status-bar{background:var(--red);}
.soon .status-bar{background:var(--yellow);}
.ok .status-bar{background:var(--green-light);}

/* Body */
.plant-body{flex:1;padding:9px 8px;min-width:0;cursor:pointer;}
.plant-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.plant-meta{font-size:10px;color:var(--muted);margin-top:3px;display:flex;gap:7px;flex-wrap:wrap;}
.liq-tag{color:var(--amber);font-weight:700;}
.loc-tag{color:var(--green-mid);font-weight:700;}
.memo-snip{font-size:10px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic;}

/* Right: days + detail button stacked vertically */
.plant-right{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:6px 9px 6px 4px;flex-shrink:0;}
.days-pill{text-align:center;padding:4px 6px;border-radius:8px;min-width:42px;}
.days-pill .dn{font-size:16px;font-weight:700;line-height:1;}
.days-pill .dl{font-size:9px;opacity:.7;}
.urgent .days-pill{background:rgba(184,50,50,.1);color:var(--red);}
.soon .days-pill{background:rgba(200,154,16,.12);color:var(--yellow);}
.ok .days-pill{background:var(--green-pale);color:var(--green-dark);}
.btn-detail{
  padding:3px 8px;border-radius:6px;border:1px solid var(--border);
  background:rgba(255,255,255,.8);color:var(--muted);font-size:10px;
  cursor:pointer;white-space:nowrap;
}
/* hide detail button in select mode */
.select-mode .btn-detail{display:none;}

/* ── MODALS ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 18px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;animation:up .25s ease;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-hdr{display:flex;gap:10px;align-items:center;margin-bottom:14px;}
.sh-img{width:52px;height:52px;border-radius:10px;overflow:hidden;background:var(--green-pale);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.sh-img img{width:100%;height:100%;object-fit:cover;}
.sh-title{font-size:15px;font-weight:700;}
.sh-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.sh-sec{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.05em;margin-bottom:7px;}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.chip{padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg);font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s;}
.chip.sel{background:var(--green-pale);border-color:var(--green-mid);font-weight:700;}
.sh-acts{display:flex;gap:8px;}
.btn-cancel-sh{flex:1;padding:11px;border-radius:10px;border:1.5px solid var(--border);background:transparent;font-family:inherit;font-size:13px;cursor:pointer;color:var(--muted);}
.btn-ok-sh{flex:2;padding:11px;border-radius:10px;border:none;background:var(--green-dark);color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;}

/* detail */
.det-sec{margin-bottom:13px;}
.det-sec h4{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.05em;margin-bottom:6px;}
.det-tags{display:flex;gap:6px;flex-wrap:wrap;}
.det-tags span{font-size:11px;background:var(--green-pale);padding:3px 9px;border-radius:20px;color:var(--green-dark);}
.det-memo{font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;background:var(--bg);border-radius:8px;padding:9px 11px;}
.hist-list{list-style:none;max-height:120px;overflow-y:auto;}
.hist-list li{font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);color:var(--muted);display:flex;gap:8px;}
.hist-list li span{color:var(--text);font-weight:600;}

/* ── MANAGE TAB ── */
.manage-wrap{padding:0 0 80px;}
.manage-section{background:var(--surface);border-bottom:2px solid var(--border);padding:14px;}
.manage-section h3{font-size:13px;font-weight:700;margin-bottom:11px;}
.form-row{margin-bottom:9px;}
.form-row label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px;}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;background:var(--bg);color:var(--text);outline:none;resize:vertical;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--green-mid);}
.form-row textarea{min-height:55px;}
.f2{display:flex;flex-direction:column;gap:0;}
.f3{display:flex;flex-direction:column;gap:0;}
.btn-primary{width:100%;padding:10px;border-radius:10px;border:none;background:var(--green-dark);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}
.btn-secondary{padding:7px 14px;border-radius:8px;border:1.5px solid var(--border);background:transparent;font-family:inherit;font-size:12px;cursor:pointer;color:var(--muted);}

.manage-list{padding:8px 10px;display:flex;flex-direction:column;gap:5px;}
.manage-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);display:flex;align-items:center;overflow:hidden;}
.mg-img{width:48px;height:48px;flex-shrink:0;background:var(--green-pale);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;}
.mg-img img{width:100%;height:100%;object-fit:cover;}
.mg-body{flex:1;padding:7px 9px;min-width:0;}
.mg-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mg-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.mg-acts{display:flex;gap:4px;padding-right:8px;flex-shrink:0;}
.btn-edit{padding:4px 10px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);font-family:inherit;font-size:11px;cursor:pointer;}
.btn-del{padding:4px 10px;border-radius:7px;border:1.5px solid #f0c0c0;background:var(--red-pale);color:var(--red);font-family:inherit;font-size:11px;cursor:pointer;font-weight:700;}

/* location manage */
.loc-item{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;display:flex;align-items:center;padding:9px 12px;gap:8px;margin-bottom:5px;}
.loc-item-icon{font-size:18px;}
.loc-item-name{flex:1;font-size:13px;font-weight:700;}
.loc-item-count{font-size:11px;color:var(--muted);}

/* edit overlay */
.edit-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:110;align-items:flex-end;justify-content:center;}
.edit-ov.open{display:flex;}
.edit-sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 18px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:up .25s ease;}
.edit-sheet h3{font-size:14px;margin-bottom:12px;}

/* toast */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--green-dark);color:#fff;padding:9px 18px;border-radius:30px;font-size:12px;z-index:300;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.25);transition:all .28s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty .ei{font-size:40px;margin-bottom:10px;}

/* select mode body class */
body.select-mode .plant-card{cursor:default;}
body.select-mode .plant-body{cursor:pointer;}/* body still opens detail? No - in select mode body toggles */

/* manage sort bar */
.manage-sort-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);}
.manage-sort-label{font-size:11px;color:var(--muted);}
.msort-btn{padding:5px 13px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-family:inherit;font-size:12px;cursor:pointer;color:var(--muted);transition:all .15s;}
.msort-btn.active{background:var(--green-dark);border-color:var(--green-dark);color:#fff;}
/* location group header in manage list */
.mg-loc-header{display:flex;align-items:center;gap:7px;padding:12px 12px 5px;font-size:12px;font-weight:700;color:var(--green-dark);border-top:2px solid var(--border);margin-top:4px;}
.mg-loc-header:first-child{border-top:none;margin-top:0;}
.mg-loc-header .mli{font-size:16px;}
.mg-loc-count{font-size:10px;color:var(--muted);font-weight:400;margin-left:2px;}
</style>
</head>
<body>

<header>
  <div class="logo">🌿</div>
  <div><h1>みずやり手帳</h1><small>Plant Watering Journal</small></div>
  <div class="today-pill"><b id="hd-date">--</b>今日</div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('list',this)">💧 水やり</button>
  <button class="tab-btn" onclick="showTab('manage',this)">🌱 植物管理</button>
  <button class="tab-btn" onclick="showTab('locations',this)">📍 置き場所</button>
</div>

<!-- ===== LIST TAB ===== -->
<div id="tab-list">
  <div class="summary">
    <div class="sum-item sum-urgent"><b id="cnt-u">0</b>要水やり</div>
    <div class="sum-item sum-soon"><b id="cnt-s">0</b>もうすぐ</div>
    <div class="sum-item sum-ok"><b id="cnt-o">0</b>良好</div>
    <div class="sum-item"><b id="cnt-t">0</b>全体</div>
  </div>

  <!-- Location filter tabs -->
  <div class="loc-scroll-wrap">
    <div class="loc-tabs" id="loc-tabs"></div>
  </div>

  <div class="controls">
    <button class="filter-btn active" onclick="setStatusFilter('all',this)">すべて</button>
    <button class="filter-btn" onclick="setStatusFilter('urgent',this)">🔴要水やり</button>
    <button class="filter-btn" onclick="setStatusFilter('soon',this)">🟡もうすぐ</button>
    <button class="filter-btn" onclick="setStatusFilter('ok',this)">🟢良好</button>
    <input class="search-box" type="text" placeholder="🔍 検索…" oninput="setSearch(this.value)">
  </div>

  <!-- Select mode toggle bar -->
  <div class="sel-mode-bar">
    <button class="sel-mode-btn" id="sel-mode-btn" onclick="toggleSelectMode()">☑ 一括選択モード</button>
    <span class="sel-hint" id="sel-hint">まとめて水やりを記録するときに使います</span>
  </div>

  <!-- Bulk action bar (shown only in select mode with selections) -->
  <div class="bulk-bar" id="bulk-bar">
    <div class="bulk-count" id="bulk-count">0件</div>
    <div class="bulk-add-group">
      <label>活力剤:</label>
      <button class="achip sel" onclick="pickBulkAdd(this,'なし')">💧なし</button>
      <button class="achip" onclick="pickBulkAdd(this,'リキダス')">🌿リキダス</button>
      <button class="achip" onclick="pickBulkAdd(this,'メネデール')">⚗️メネデール</button>
      <button class="achip" onclick="pickBulkAdd(this,'ハイポネックス')">🌸ハイポ</button>
      <button class="achip" onclick="pickBulkAdd(this,'その他')">✨その他</button>
    </div>
    <button class="bulk-ok" onclick="bulkRecord()">💧記録する</button>
    <span class="bulk-clr" onclick="clearSel()">解除</span>
  </div>

  <div class="plant-list" id="plant-list"></div>
</div>

<!-- ===== MANAGE TAB ===== -->
<div id="tab-manage" style="display:none;">
  <div class="manage-wrap">
    <div class="manage-section">
      <h3>➕ 新しい植物を追加</h3>
      <div class="form-row"><label>植物名 *</label><input id="i-name" type="text" placeholder="例: モンステラ・デリシオーサ"></div>
      <div class="form-row"><label>置き場所</label><select id="i-loc"></select></div>
      <div class="f2">
        <div class="form-row"><label>画像URL（任意）</label><input id="i-img" type="text" placeholder="https://..."></div>
        <div class="form-row"><label>活力剤</label>
          <select id="i-add">
            <option value="なし">なし</option><option value="リキダス">リキダス</option>
            <option value="メネデール">メネデール</option><option value="ハイポネックス">ハイポネックス</option>
            <option value="その他">その他</option>
          </select>
        </div>
      </div>
      <div class="f2">
        <div class="form-row"><label>最終水やり日</label><input id="i-water" type="date"></div>
        <div class="form-row"><label>導入年月日</label><input id="i-intro" type="date"></div>
      </div>
      <div class="f3">
        <div class="form-row"><label>植え替え年月</label><input id="i-repot" type="month" placeholder="YYYY-MM"></div>
        <div class="form-row"><label>鉢サイズ（号）</label><input id="i-pot" type="text" placeholder="例: 6号"></div>
        <div class="form-row"><label>購入場所</label><input id="i-shop" type="text" placeholder="例: 渋谷GREEN"></div>
      </div>
      <div class="form-row"><label>用土</label><input id="i-soil" type="text" placeholder="例: 観葉植物の土、赤玉土7:腐葉土3 など"></div>
      <div class="form-row"><label>メモ・エピソード</label><textarea id="i-memo" placeholder="例: 引越し祝いにもらった。最初は小さかったのに…"></textarea></div>
      <button class="btn-primary" onclick="addPlant()">🌱 追加する</button>
    </div>
    <!-- sort controls -->
    <div class="manage-sort-bar">
      <span class="manage-sort-label">並び順：</span>
      <button class="msort-btn active" id="msort-kana" onclick="setManageSort('kana',this)">あいうえお順</button>
      <button class="msort-btn" id="msort-intro" onclick="setManageSort('intro',this)">導入日順</button>
    </div>
    <div class="manage-list" id="manage-list"></div>
  </div>
</div>
<div id="tab-locations" style="display:none;">
  <div class="manage-wrap">
    <div class="manage-section">
      <h3>📍 置き場所を追加・編集</h3>
      <div style="display:grid;grid-template-columns:1fr 80px;gap:8px;">

// ── LOAD STATE ──
function loadLocs() {
  const s = localStorage.getItem('pw_locs_v5');
  return s ? JSON.parse(s) : DEFAULT_LOCS.map(l=>({...l}));
}
function loadPlants() {
  const s = localStorage.getItem('pw_plants_v5');
  return s ? JSON.parse(s) : DEFAULT_PLANTS.map(p=>({...p}));
}
let locations = loadLocs();
let plants = loadPlants();

function saveLocs() { localStorage.setItem('pw_locs_v5', JSON.stringify(locations)); }
function savePlants() { localStorage.setItem('pw_plants_v5', JSON.stringify(plants)); }

// ── STATE ──
let selIds = new Set();
let bulkAdd = 'なし';
let selMode = false;
let curLocFilter = 'all';
let curStatusFilter = 'all';
let curSearch = '';
let singleIdx = null, singleAdd = null;
let detailIdx = null;
let editIdx = null;
let editLocIdx = null;

// ── HELPERS ──
function days(d) { if(!d) return 9999; return Math.floor((TODAY - new Date(d))/864e5); }
function status(d) { return d>=14?'urgent':d>=7?'soon':'ok'; }
function fmt(d) { if(!d) return '未実施'; const dt=new Date(d); return `${dt.getMonth()+1}/${dt.getDate()}`; }
function fmtFull(d) { if(!d) return null; const dt=new Date(d); return `${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()}`; }
function fmtMonth(m) { if(!m) return null; const [y,mo]=m.split('-'); return `${y}年${parseInt(mo)}月`; }
function getLoc(id) { return locations.find(l=>l.id===id) || {name:'未設定',icon:'📦'}; }
function imgDiv(name, cls='plant-img') {
  const src = IMG[name];
  return src
    ? `<div class="${cls}"><img src="${src}" alt="${name}" onerror="this.parentNode.innerHTML='🪴'"></div>`
    : `<div class="${cls}">🪴</div>`;
}
function toast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
function closeOv(id,e) { if(e.target.id===id) closeOvD(id); }
function closeOvD(id) { document.getElementById(id).classList.remove('open'); }

// ── LOCATION SELECT HELPERS ──
function buildLocOptions(selEl, selectedId) {
  selEl.innerHTML = '<option value="">— 未設定 —</option>' +
    locations.map(l=>`<option value="${l.id}" ${l.id===selectedId?'selected':''}>${l.icon} ${l.name}</option>`).join('');
}

// ── SELECT MODE ──
function toggleSelectMode() {
  selMode = !selMode;
  selIds.clear();
  document.body.classList.toggle('select-mode', selMode);
  const btn = document.getElementById('sel-mode-btn');
  const hint = document.getElementById('sel-hint');
  btn.classList.toggle('on', selMode);

  hint.textContent = selMode ? 'カードをタップして選択→「記録する」' : 'まとめて水やりを記録するときに使います';
  updateBulkBar(); render();
}

// ── FILTER ──
function setLocFilter(loc, btn) {
  curLocFilter = loc;
  document.querySelectorAll('.loc-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); render();
}
function setStatusFilter(f, btn) {

}

// ── SELECTION ──
function toggleSel(idx) {
  if(!selMode) return;
  selIds.has(idx) ? selIds.delete(idx) : selIds.add(idx);
  updateBulkBar(); render();
}
function clearSel() { selIds.clear(); updateBulkBar(); render(); }
function updateBulkBar() {
  const n = selIds.size;
  document.getElementById('bulk-count').textContent = `${n}件選択`;
  document.getElementById('bulk-bar').classList.toggle('vis', selMode && n>0);
}
function pickBulkAdd(el, val) {
  document.querySelectorAll('.bulk-bar .achip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel'); bulkAdd = val;
}
function bulkRecord() {
  if(!selIds.size) return;
  selIds.forEach(i=>{
    plants[i].lastWater = TODAY_STR;
    plants[i].additive = bulkAdd;
    if(!plants[i].history) plants[i].history=[];
    plants[i].history.unshift({date:TODAY_STR,additive:bulkAdd});
    if(plants[i].history.length>20) plants[i].history.pop();
  });
  const n=selIds.size; savePlants(); clearSel();
  // keep select mode on so user can do another batch
  render(); toast(`💧 ${n}件を記録（${ADD_ICON[bulkAdd]} ${bulkAdd}）`);
}

// ── WATER MODAL ──
function openWater(idx) {
  singleIdx=idx; singleAdd=plants[idx].additive||'なし';

    ? `<img src="${IMG[p.name]}" alt="${p.name}" onerror="this.innerHTML='🪴'">` : '🪴';
  document.getElementById('sh-chips').innerHTML = ADDS.map(a=>
    `<button class="chip ${a===singleAdd?'sel':''}" onclick="pickWaterAdd('${a}',this)">${ADD_ICON[a]} ${a}</button>`
  ).join('');

}
function pickWaterAdd(val,el) {
  singleAdd=val;
  document.querySelectorAll('#sh-chips .chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
}
function confirmWater() {
  if(singleIdx===null) return;
  plants[singleIdx].lastWater=TODAY_STR; plants[singleIdx].additive=singleAdd;
  if(!plants[singleIdx].history) plants[singleIdx].history=[];
  plants[singleIdx].history.unshift({date:TODAY_STR,additive:singleAdd});

  if(p.repot) tags+=`<span>🪴 植え替え: ${fmtMonth(p.repot)}</span>`;

  if(p.shop)  tags+=`<span>🏪 ${p.shop}</span>`;

// ── RENDER LOC TABS ──
function renderLocTabs() {
  const el=document.getElementById('loc-tabs');
  let html=`<button class="loc-tab ${curLocFilter==='all'?'active':''}" onclick="setLocFilter('all',this)">🌿 すべて</button>`;
  locations.forEach(l=>{
    const cnt=plants.filter(p=>p.loc===l.id).length;
    html+=`<button class="loc-tab ${curLocFilter===l.id?'active':''}" onclick="setLocFilter('${l.id}',this)">${l.icon} ${l.name}（${cnt}）</button>`;
  });
  const noCnt=plants.filter(p=>!p.loc||!locations.find(l=>l.id===p.loc)).length;
  if(noCnt>0) html+=`<button class="loc-tab ${curLocFilter==='none'?'active':''}" onclick="setLocFilter('none',this)">📦 未設定（${noCnt}）</button>`;
  el.innerHTML=html;
}

// ── RENDER LIST ──
function render() {
  let u=0,s=0,o=0;
  plants.forEach(p=>{const st=status(days(p.lastWater));if(st==='urgent')u++;else if(st==='soon')s++;else o++;});
  document.getElementById('cnt-u').textContent=u;
  document.getElementById('cnt-s').textContent=s;
  document.getElementById('cnt-o').textContent=o;
  document.getElementById('cnt-t').textContent=plants.length;
  renderLocTabs();

  let list=plants.map((p,i)=>({...p,idx:i,d:days(p.lastWater)}));

  // loc filter
  if(curLocFilter==='none') list=list.filter(p=>!p.loc||!locations.find(l=>l.id===p.loc));
  else if(curLocFilter!=='all') list=list.filter(p=>p.loc===curLocFilter);

  // status filter
  if(curStatusFilter!=='all') list=list.filter(p=>status(p.d)===curStatusFilter);

  // search
  if(curSearch){const q=curSearch.toLowerCase();list=list.filter(p=>p.name.toLowerCase().includes(q));}

  const el=document.getElementById('plant-list');
  if(!list.length){el.innerHTML=`<div class="empty"><div class="ei">🌵</div>該当なし</div>`;return;}

  // grouping: by location first, then status within
  const isGroupedByLoc = curLocFilter==='all' && !curSearch && curStatusFilter==='all';

  let html='';
  if(isGroupedByLoc) {
    // group by location
    const locOrder=[...locations.map(l=>l.id), 'none'];
    locOrder.forEach(lid=>{
      let grp = lid==='none'
        ? list.filter(p=>!p.loc||!locations.find(l=>l.id===p.loc))
        : list.filter(p=>p.loc===lid);
      if(!grp.length) return;
      grp.sort((a,b)=>{const ord={urgent:0,soon:1,ok:2};return ord[status(a.d)]-ord[status(b.d)]||b.d-a.d;});
      const loc = lid==='none' ? {name:'未設定',icon:'📦'} : getLoc(lid);
      html+=`<div class="loc-section-label"><span class="loc-icon">${loc.icon}</span>${loc.name}</div>`;
      grp.forEach(p=>{ html+=cardHtml(p); });
    });
  } else {
    // flat sort by status
    list.sort((a,b)=>{const ord={urgent:0,soon:1,ok:2};return ord[status(a.d)]-ord[status(b.d)]||b.d-a.d;});
    const gl={urgent:'🔴 要水やり（14日以上）',soon:'🟡 もうすぐ（7〜13日）',ok:'🟢 良好'};
    let lastSt=null;
    list.forEach(p=>{
      const st=status(p.d);
      if(st!==lastSt){html+=`<div class="status-section-label">${gl[st]}</div>`;lastSt=st;}
      html+=cardHtml(p);
    });
  }
  el.innerHTML=html;
}

function cardHtml(p) {
  const st=status(p.d);
  const sel=selIds.has(p.idx);
  const dn=p.d===9999?'未':p.d; const du=p.d===9999?'実施':'日';
  const addTag=p.additive&&p.additive!=='なし'?`<span class="liq-tag">${ADD_ICON[p.additive]} ${p.additive}</span>`:'';
  const memoSnip=p.memo?`<div class="memo-snip">💬 ${p.memo}</div>`:'';
  const src=IMG[p.name]||'';
  const imgEl=src
    ?`<div class="plant-img" onclick="handleImgClick(event,${p.idx})"><img src="${src}" alt="${p.name}" onerror="this.parentNode.innerHTML='🪴'"></div>`
    :`<div class="plant-img" onclick="handleImgClick(event,${p.idx})">🪴</div>`;

  return `
  <div class="plant-card ${st} ${sel?'sel-card':''}" id="card-${p.idx}">
    <button class="card-check" onclick="toggleSel(${p.idx})" aria-label="選択">
      <div class="chk-circle">${sel?'✓':''}</div>
    </button>
    ${imgEl}
    <div class="status-bar"></div>
    <div class="plant-body" onclick="handleBodyClick(event,${p.idx})">
      <div class="plant-name">${p.name}</div>
      <div class="plant-meta"><span>📅 ${fmt(p.lastWater)}</span>${addTag}</div>
      ${memoSnip}
    </div>
    <div class="plant-right">
      <div class="days-pill"><div class="dn">${dn}</div><div class="dl">${du}</div></div>
      <button class="btn-detail" onclick="openDetail(${p.idx})">📋 詳細</button>
    </div>
  </div>`;
}

function handleImgClick(e, idx) {
  if(selMode) { e.stopPropagation(); toggleSel(idx); }
  else openDetail(idx);
}
function handleBodyClick(e, idx) {
  if(selMode) toggleSel(idx);
  else openDetail(idx);
}

// ── RENDER MANAGE ──
let manageSort = 'kana'; // 'kana' | 'intro'

function setManageSort(val, btn) {
  manageSort = val;
  document.querySelectorAll('.msort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderManage();
}

function renderManage() {
  buildLocOptions(document.getElementById('i-loc'), '');
  const el = document.getElementById('manage-list');
  if (!plants.length) {
    el.innerHTML = `<div class="empty"><div class="ei">🌱</div>植物がまだ登録されていません</div>`;
    return;
  }

  // ソート関数
  function sortFn(a, b) {
    if (manageSort === 'intro') {
      // 導入日昇順（nullは末尾）
      if (!a.intro && !b.intro) return a.name.localeCompare(b.name, 'ja');
      if (!a.intro) return 1;
      if (!b.intro) return -1;
      return a.intro < b.intro ? -1 : a.intro > b.intro ? 1 : 0;
    }
    // あいうえお順
    return a.name.localeCompare(b.name, 'ja');
  }

  // 置き場所ごとにグループ化
  const locOrder = [...locations.map(l => l.id), '__none__'];
  let html = '';

  locOrder.forEach(lid => {
    const isNone = lid === '__none__';
    const grp = plants
      .map((p, i) => ({...p, _idx: i}))
      .filter(p => isNone
        ? (!p.loc || !locations.find(l => l.id === p.loc))
        : p.loc === lid
      )
      .sort(sortFn);
    if (!grp.length) return;

    const loc = isNone ? {name:'未設定', icon:'📦'} : getLoc(lid);
    html += `<div class="mg-loc-header"><span class="mli">${loc.icon}</span>${loc.name}<span class="mg-loc-count">（${grp.length}鉢）</span></div>`;

    grp.forEach(p => {
      const i = p._idx;
      const src = IMG[p.name] || '';
      const imgEl = src
        ? `<div class="mg-img"><img src="${src}" alt="${p.name}" onerror="this.parentNode.innerHTML='🪴'"></div>`
        : `<div class="mg-img">🪴</div>`;
      const subParts = [];
      if (p.intro) subParts.push(`📅 ${fmtFull(p.intro)}`);
      if (p.pot)   subParts.push(`⬜ ${p.pot}`);
      if (p.repot) subParts.push(`🪴 植替: ${fmtMonth(p.repot)}`);
      if (p.soil)  subParts.push(`🌱 ${p.soil}`);
      html += `
      <div class="manage-card">
        ${imgEl}
        <div class="mg-body">
          <div class="mg-name">${p.name}</div>
          ${subParts.length ? `<div class="mg-sub">${subParts.join('  ')}</div>` : ''}
        </div>
        <div class="mg-acts">
          <button class="btn-edit" onclick="openEdit(${i})">編集</button>
          <button class="btn-del" onclick="deletePlant(${i})">削除</button>
        </div>
      </div>`;
    });
  });

  el.innerHTML = html;
}

// ── RENDER LOC MANAGE ──
function renderLocManage() {
  const el=document.getElementById('loc-manage-list');
  if(!locations.length){el.innerHTML=`<div class="empty"><div class="ei">📍</div>置き場所がありません</div>`;return;}
  el.innerHTML=locations.map((l,i)=>{
    const cnt=plants.filter(p=>p.loc===l.id).length;
    return `
    <div class="loc-item">
      <span class="loc-item-icon">${l.icon}</span>
      <span class="loc-item-name">${l.name}</span>
      <span class="loc-item-count">${cnt}鉢</span>
      <button class="btn-edit" onclick="openEditLoc(${i})">編集</button>
      <button class="btn-del" onclick="deleteLoc(${i})">削除</button>
    </div>`;
  }).join('');
}

// ── TABS ──
function showTab(tab, btn) {
  ['list','manage','locations'].forEach(t=>{
    document.getElementById('tab-'+t).style.display = t===tab?'':'none';
  });
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(tab==='manage') renderManage();
  if(tab==='locations') renderLocManage();
}
